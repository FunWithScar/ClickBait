<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickBait</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Clic Bait</h1>
    <p>The internet's most useless achievement simulator.</p>
</header>

<div class="container">

    <section class="card profile">

        <h2>Player</h2>

        <div class="level">
            Level <span id="level">1</span>
        </div>

        <div class="xp-bar">
            <div id="xp-fill" class="xp-fill"></div>
        </div>

        <p>
            <span id="xp">0</span> /
            <span id="next-level">100</span> XP
        </p>

    </section>

    <section class="card stats">

        <h2>Statistics</h2>

        <div class="stat">
            <span>🖱 Clicks</span>
            <span id="clicks">0</span>
        </div>

        <div class="stat">
            <span>⌨ Keys</span>
            <span id="keys">0</span>
        </div>

        <div class="stat">
            <span>📜 Scroll</span>
            <span id="scroll">0 px</span>
        </div>

        <div class="stat">
            <span>🖱 Mouse Distance</span>
            <span id="mouse-distance">0 px</span>
        </div>

        <div class="stat">
            <span>😴 Idle</span>
            <span id="idle">0s</span>
        </div>

        <div class="stat">
            <span>⏱ Time Played</span>
            <span id="time">0m 0s</span>
        </div>

    </section>

    <section class="card achievements">

        <h2>Achievements</h2>

        <ul id="achievement-list">

        </ul>

    </section>

</div>

<div style="text-align:center;margin-top:40px;">

    <a href="#" id="dummy-link">
        Hover over me... if you dare.
    </a>

</div>

<div id="toast" class="toast">

    <h3>🏆 Achievement Unlocked!</h3>

    <h2 id="toast-title"></h2>

    <p id="toast-description"></p>

</div>

<script src="js/achievements.js"></script>
<script src="js/xp.js"></script>
<script src="js/popup.js"></script>
<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/app.js"></script>

</body>
</html>
